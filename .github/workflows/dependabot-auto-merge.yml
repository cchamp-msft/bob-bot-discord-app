name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge safe devDependency updates
        if: >
          steps.metadata.outputs.dependency-type == 'direct:development'
          && (steps.metadata.outputs.update-type == 'version-update:semver-minor'
              || steps.metadata.outputs.update-type == 'version-update:semver-patch')
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          gh pr review "${{ github.event.pull_request.html_url }}" --approve --body \
            "Auto-approved: safe devDependency ${{ steps.metadata.outputs.update-type }}"
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --rebase

      - name: Auto-merge safe GitHub Actions updates
        if: >
          steps.metadata.outputs.package-ecosystem == 'github_actions'
          && (steps.metadata.outputs.update-type == 'version-update:semver-minor'
              || steps.metadata.outputs.update-type == 'version-update:semver-patch')
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          gh pr review "${{ github.event.pull_request.html_url }}" --approve --body \
            "Auto-approved: safe GitHub Actions ${{ steps.metadata.outputs.update-type }}"
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --rebase
